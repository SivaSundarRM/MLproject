<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login{
            background:#fff;
            width:100%;
            max-width:700px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .login h1{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        legend{
            text-align:center;
            color:#555;
            font-size:22px;
            margin-bottom:20px;
        }

        .mb-3{
            margin-bottom:15px;
        }

        .form-label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#444;
        }

        .form-control{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        .form-control:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 5px rgba(102,126,234,0.5);
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#5563d6;
        }

        h2{
            margin-top:20px;
            text-align:center;
            color:#28a745;
        }
    </style>
</head>

<body>
    <div class="login">
        <h1>Student Exam Performance Indicator</h1>

        <form action="{{ url_for('predict') }}" method="post">

            <legend>Student Exam Performance Prediction</legend>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select class="form-control" name="gender" required>
                    <option selected disabled value="">Select your Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Race or Ethnicity</label>
                <select class="form-control" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Parental Level of Education</label>
                <select class="form-control" name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Lunch Type</label>
                <select class="form-control" name="lunch" required>
                    <option selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Test Preparation Course</label>
                <select class="form-control" name="test_preparation_course" required>
                    <option selected disabled value="">Select Course Status</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Reading Score (0 - 100)</label>
                <input
                    class="form-control"
                    type="number"
                    name="reading_score"
                    placeholder="Enter Reading Score"
                    min="0"
                    max="100"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Writing Score (0 - 100)</label>
                <input
                    class="form-control"
                    type="number"
                    name="writing_score"
                    placeholder="Enter Writing Score"
                    min="0"
                    max="100"
                    required>
            </div>

            <div class="mb-3">
                <input
                    class="btn"
                    type="submit"
                    value="Predict Maths Score">
            </div>

        </form>

        <h2>
            Predicted Maths Score: {{ results }}
        </h2>

    </div>
</body>
</html>
